# Fluent Bit DEBUG config for iHost / HAOS
# Verbose logging, no filters — all log levels forwarded.
# Switch at runtime:
#   cp /etc/fluent-bit/fluent-bit-debug.conf /mnt/data/fluent-bit/override.conf
#   systemctl restart fluent-bit
# Revert:
#   rm /mnt/data/fluent-bit/override.conf
#   systemctl restart fluent-bit

[SERVICE]
    Flush        5
    Daemon       off
    Log_Level    info
    Parsers_File parsers.conf
    storage.path              /mnt/data/fluent-bit/storage
    storage.sync              normal
    storage.checksum          on
    storage.backlog.mem_limit 5M

# --- INPUTS ----------------------------------------------------------
# 1) Systemd: all units (not filtered)
[INPUT]
    Name              systemd
    Tag               ihost.systemd
    Read_From_Tail    true
    storage.type      filesystem

# 2) Home Assistant core log
[INPUT]
    Name              tail
    Tag               ihost.hass
    Path              /mnt/data/supervisor/logs/homeassistant.log
    Parser            homeassistant
    DB                /mnt/data/fluent-bit/db/homeassistant.db
    Mem_Buf_Limit     5M
    Skip_Long_Lines   On
    storage.type      filesystem

# 3) Supervisor log
[INPUT]
    Name              tail
    Tag               ihost.supervisor
    Path              /mnt/data/supervisor/logs/supervisor.log
    Parser            homeassistant
    DB                /mnt/data/fluent-bit/db/supervisor.db
    Mem_Buf_Limit     2M
    Skip_Long_Lines   On
    storage.type      filesystem

# 4) Kernel messages (debug only)
[INPUT]
    Name              kmsg
    Tag               ihost.kernel

# --- FILTERS ---------------------------------------------------------
# Metadata only — NO grep filters (all log levels pass through)
[FILTER]
    Name          record_modifier
    Match         ihost.*
    Record        device_type ihost
    Record        env ${GA_ENV}
    Record        device_label ${DEVICE_LABEL}
    Record        config debug

# --- OUTPUTS ---------------------------------------------------------
[OUTPUT]
    Name          loki
    Match         ihost.*
    Host          loki.greenautarky.com
    Port          3100
    URI           /loki/api/v1/push
    labels        job=ihost,uuid=${DEVICE_UUID},env=${GA_ENV},device_label=${DEVICE_LABEL}
    line_format   json
    drop_single_key On
    Retry_Limit   False
    storage.total_limit_size 300M
    compress      gzip
