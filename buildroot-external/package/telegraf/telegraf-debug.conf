###############################################################################
# Telegraf DEBUG config for iHost / HAOS
# High-frequency collection for troubleshooting — NOT for production use.
# Switch at runtime:
#   cp /etc/telegraf/telegraf-debug.conf /mnt/data/telegraf/override.conf
#   systemctl restart telegraf
# Revert:
#   rm /mnt/data/telegraf/override.conf
#   systemctl restart telegraf
###############################################################################

[agent]
  interval = "15s"                 # High frequency for debugging
  round_interval = true
  metric_batch_size = 500
  metric_buffer_limit = 100000
  collection_jitter = "2s"
  flush_interval = "10s"
  flush_jitter = "2s"
  logfile = ""
  quiet = false
  debug = true                     # Enable debug logging
  omit_hostname = true

[global_tags]
  env = "${GA_ENV}"
  device_type = "ihost"
  uuid = "${DEVICE_UUID}"
  device_label = "${DEVICE_LABEL}"
  os_version = "${GA_BUILD_TIMESTAMP}"
  config = "debug"                 # Tag to identify debug data in InfluxDB

###############################################################################
# INPUTS - ESSENTIAL HOST METRICS
###############################################################################

[[inputs.cpu]]
  percpu = true                    # Per-CPU in debug mode
  totalcpu = true
  collect_cpu_time = true
  report_active = true

[[inputs.mem]]

[[inputs.swap]]

[[inputs.system]]

[[inputs.disk]]
  mount_points = ["/mnt/data"]
  ignore_fs = ["tmpfs", "devtmpfs", "overlay", "squashfs", "erofs"]

[[inputs.net]]
  interfaces = ["eth0", "end0", "wlan0", "wt0"]
  ignore_protocol_stats = false    # Include protocol stats in debug

###############################################################################
# INPUTS - DOCKER METRICS
###############################################################################

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  container_name_include = []
  container_name_exclude = ["telegraf"]
  timeout = "5s"
  perdevice = true                 # Per-device stats in debug

###############################################################################
# INPUTS - NETWORK CONNECTIVITY
###############################################################################

[[inputs.ping]]
  urls = ["${GATEWAY_IP}", "1.1.1.1", "8.8.8.8"]
  method = "native"
  count = 3
  ping_interval = 1.0              # Every second for latency debugging
  timeout = 4.0

###############################################################################
# INPUTS - WIFI SIGNAL STRENGTH
###############################################################################

[[inputs.wireless]]

###############################################################################
# INPUTS - BOOT TIMING
###############################################################################

[[inputs.exec]]
  commands = ["/usr/libexec/ga-boot-timing"]
  timeout = "10s"
  interval = "5m"                  # More frequent in debug
  data_format = "influx"

###############################################################################
# INPUTS - PROCESS MONITORING (debug only)
###############################################################################

[[inputs.processes]]

###############################################################################
# OUTPUTS
###############################################################################

[[outputs.influxdb]]
  urls = ["http://influx.greenautarky.com:8086"]
  database = "device_metrics"
  username = "device_writer"
  password = "${INFLUX_PASSWORD}"
  precision = "s"
  timeout = "5s"
  content_encoding = "gzip"
