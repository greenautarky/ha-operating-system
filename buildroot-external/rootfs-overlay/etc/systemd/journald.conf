[Journal]
# Persistent storage ensures logs survive reboots (use journalctl -b -1 for previous boot)
Storage=persistent
Compress=yes
SystemMaxUse=500M
# Keep logs from last 3 boots for crash analysis
MaxRetentionSec=7day
# Rate limiting — prevent a single misbehaving service from exhausting the 500MB journal.
# Problem: production devices running tenant Home Assistant automations with broken Jinja2
# templates can generate thousands of error log lines per minute. Without rate limiting,
# this fills the journal in hours and rotates out critical boot/crash diagnostics.
# Behaviour: systemd-journald drops messages from a service that exceeds the burst limit
# within the interval window and logs one "... messages suppressed" line instead.
# Rate limiting is per-service (per cgroup), so HA Core, telegraf, fluent-bit etc. each
# get an independent budget — a spammy addon does not starve other services' logs.
# Values:
#   RateLimitIntervalSec=30s  — evaluation window
#   RateLimitBurst=1000       — max messages per service per window
#     Generous enough for normal operation (telegraf, fluent-bit, HA startup bursts),
#     but catches runaway spam: a broken template firing on every state change at
#     10 state changes/sec = 300 msg/30s → passes through. A tight loop generating
#     thousands/sec → capped after 1000, remainder dropped with a suppression notice.
RateLimitIntervalSec=30s
RateLimitBurst=1000
