[main]
dns=default
plugins=keyfile
autoconnect-retries-default=0
rc-manager=file

[keyfile]
unmanaged-devices=type:bridge;type:tun;driver:veth

[logging]
backend=journal

[connection]
connection.mdns=2
connection.llmnr=2
# Infinite reconnect attempts — never give up on autoconnect
connection.autoconnect-retries=0

[connection-wifi-defaults]
match-device=type:wifi
# Disable WiFi power save (2 = disabled) for stable connections
wifi.powersave=2
# Use permanent MAC address — no randomization for consistent device identity
wifi.cloned-mac-address=permanent
# Actively probe for hidden SSIDs
wifi.hidden=true
# Prefer WiFi over other connection types
connection.autoconnect-priority=100

[connectivity]
uri=http://checkonline.greenautarky.com/online.txt
interval=600

[device]
wifi.scan-rand-mac-address=no
wifi.mac-address-randomization=1
