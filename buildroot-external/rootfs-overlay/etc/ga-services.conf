# ga-services.conf — Central GA backend endpoint configuration
#
# This file defines the IP addresses for all GreenAutarky backend services.
# It is the SINGLE SOURCE OF TRUTH for GA endpoint resolution on the device.
#
# At boot, ga-update-hosts.service reads this file and writes the corresponding
# entries into /etc/hosts (via the overlay on /mnt/data). The Supervisor DNS
# plugin also reads this file to inject entries into CoreDNS.
#
# RUNTIME OVERRIDE:
#   Copy this file to /mnt/data/ga-services.conf and edit. The override takes
#   precedence over the rootfs version. This allows IP changes without an OS
#   update (just SSH + edit + reboot).
#
# IP CHANGE PROCEDURE:
#   1. Update this file in the source tree (for new builds)
#   2. For deployed devices: SSH and edit /mnt/data/ga-services.conf
#   3. Reboot — ga-update-hosts.service applies the new IPs
#
# Format: KEY=value (sourced by /bin/sh, no spaces around =)

# ga-tools server (NetBird VPN IP)
GA_SERVICES_IP=100.126.129.116

# Individual service hostnames (resolved to GA_SERVICES_IP by ga-update-hosts)
GA_INFLUX_HOST=influx.greenautarky.com
GA_LOKI_HOST=loki.greenautarky.com
GA_OTA_HOST=ota.greenautarky.com

# Connectivity check endpoint (public, not behind VPN)
GA_CHECKONLINE_HOST=checkonline.greenautarky.com
