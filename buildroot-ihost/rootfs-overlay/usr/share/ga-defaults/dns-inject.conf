# GA service DNS entries — injected into Supervisor CoreDNS at boot
# Format: IP HOSTNAME
# These are needed because Supervisor containers use their own DNS (hassio_dns)
# and do NOT see host /etc/hosts entries.
#
# Primary resolution: NetBird DNS Zones (configured in NetBird Management UI)
# This file: fallback when NetBird DNS integration doesn't work
# (known issue: NetBird doesn't register with systemd-resolved on embedded Linux)
#
